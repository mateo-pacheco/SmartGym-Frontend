<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/brand/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SmartGym — plataforma universitaria de tecnología deportiva, salud y control operativo."
    />
    <title>SmartGym · UCACUE</title>
    <script>
      // Evita el flash de tema: aplica la preferencia guardada antes del primer paint.
      (function () {
        try {
          var saved = localStorage.getItem('sg-theme');
          var theme =
            saved === 'dark' || saved === 'light'
              ? saved
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          /* sin acceso a storage: se mantiene el tema claro */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
